<ion-header class="ion-no-border">
  <ion-toolbar class="transparent-header">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="home" color="light"></ion-back-button>
    </ion-buttons>
    <ion-title class="premium-title">Météo</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="toggleHistory()" color="light">
        <ion-icon name="time-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="weather-premium-bg">
  
  <!-- SEARCH BAR -->
  <div class="search-wrapper">
    <ion-searchbar
      [(ngModel)]="searchQuery"
      (ionInput)="onSearchChange()"
      (keyup.enter)="searchCity()"
      placeholder="Rechercher une ville..."
      class="premium-search"
      search-icon="search-outline">
    </ion-searchbar>
  </div>

  <!-- HISTORY PANEL -->
  <div class="history-panel" *ngIf="showHistory && history.length > 0">
    <div class="history-header">
      <span class="history-title">Recherches récentes</span>
      <ion-button fill="clear" color="danger" size="small" class="clear-btn" (click)="clearHistory()">
        Effacer
      </ion-button>
    </div>
    <div class="history-list">
      <div class="history-pill" *ngFor="let item of history" (click)="selectHistory(item)">
        <ion-icon name="location-outline"></ion-icon>
        <span>{{ item }}</span>
      </div>
    </div>
  </div>

  <!-- WEATHER WIDGET -->
  <div class="widget-container" *ngIf="weatherData">
    <div class="premium-glass-card">
      
      <div class="card-header">
        <h2 class="city-name">{{ city }}</h2>
        <span class="country-badge">{{ country }}</span>
      </div>

      <div class="card-body">
        <div class="temp-section">
          <h1 class="huge-temp">{{ temp }}&deg;</h1>
          <p class="weather-desc">{{ description }}</p>
        </div>
        
        <div class="icon-section">
          <div class="glow-circle">
            <ion-icon name="partly-sunny-outline" class="weather-main-icon"></ion-icon>
          </div>
        </div>
      </div>

      <div class="card-footer">
        <div class="metric-item">
          <div class="metric-icon-wrap bg-blue">
            <ion-icon name="water"></ion-icon>
          </div>
          <div class="metric-info">
            <span class="metric-value">{{ hum }}%</span>
            <span class="metric-label">Humidité</span>
          </div>
        </div>

        <div class="metric-item">
          <div class="metric-icon-wrap bg-green">
            <ion-icon name="leaf-outline"></ion-icon>
          </div>
          <div class="metric-info">
            <span class="metric-value">{{ pres }} <small>hPa</small></span>
            <span class="metric-label">Pression</span>
          </div>
        </div>
      </div>
      
    </div>
  </div>

  <!-- LOADING -->
  <div *ngIf="!weatherData" class="loading-state">
    <div class="spinner-ring"></div>
    <p>Recherche en cours...</p>
  </div>

</ion-content>
