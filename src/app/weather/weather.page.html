<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar class="transparent-toolbar">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="home" color="light"></ion-back-button>
    </ion-buttons>
    <ion-title color="light">Météo</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="weather-bg">
  <div class="search-container">
    <ion-searchbar 
      [(ngModel)]="searchQuery" 
      (ionChange)="searchCity()" 
      placeholder="Rechercher une ville..." 
      class="custom-search">
    </ion-searchbar>
  </div>

  <div class="weather-wrapper" *ngIf="weatherData">
    <div class="glass-card">
      <div class="location-header">
        <ion-icon name="location-outline" class="location-icon"></ion-icon>
        <h2 class="city-title">{{ city }}, {{ country }}</h2>
      </div>

      <div class="main-weather">
        <div class="weather-icon-container">
          <ion-icon name="partly-sunny-outline" class="main-icon"></ion-icon>
        </div>
        <h1 class="temperature">{{ temp }}°</h1>
        <p class="weather-description">{{ description }}</p>
      </div>

      <div class="weather-details">
        <div class="detail-box">
          <ion-icon name="water" class="detail-icon drop"></ion-icon>
          <span class="detail-value">{{ hum }}%</span>
          <span class="detail-label">Humidité</span>
        </div>
        <div class="divider"></div>
        <div class="detail-box">
          <ion-icon name="leaf-outline" class="detail-icon wind"></ion-icon>
          <span class="detail-value">{{ pres }}</span>
          <span class="detail-label">Pression (hPa)</span>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="!weatherData" class="loading-wrapper">
    <ion-spinner name="crescent" color="light"></ion-spinner>
    <p class="loading-text">Chargement des données...</p>
  </div>
</ion-content>
