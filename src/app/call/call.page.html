<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar class="call-toolbar">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="home" color="light"></ion-back-button>
    </ion-buttons>
    <ion-title color="light">Appel Téléphonique</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="call-bg">
  <div class="call-container">
    <div class="header-section">
      <div class="icon-circle">
        <ion-icon name="call-outline"></ion-icon>
      </div>
      <h2>Téléphone</h2>
      <p>Lancez un appel directement depuis l'application</p>
    </div>

    <ion-card class="glass-card">
      <ion-card-content>
        <div class="input-group">
          <ion-item lines="none" class="custom-item">
            <ion-icon name="person-outline" slot="start"></ion-icon>
            <ion-input
              type="tel"
              label="Numéro à appeler"
              label-placement="stacked"
              placeholder="06 XX XX XX XX"
              [(ngModel)]="phoneNumber"
              class="custom-input">
            </ion-input>
          </ion-item>
        </div>

        <div class="dialpad-info">
          <ion-icon name="keypad-outline"></ion-icon>
          <ion-text>Saisissez le numéro et appuyez sur le bouton ci-dessous</ion-text>
        </div>

        <ion-button expand="block" class="call-action-button" (click)="makeCall()">
          Appeler
          <ion-icon name="call-outline" slot="end"></ion-icon>
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
